<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Cube</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f3f3f3; font-family: Arial, sans-serif; color: #000000; overflow-x: hidden; }
        #auth-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #0c0c0c; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-box { padding: 35px; background: #141414; border: 2px solid #ff1e3a; border-radius: 12px; width: 340px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 0 20px rgba(255, 30, 58, 0.2); }
        .auth-box input, .auth-box select, .auth-box button { padding: 12px; font-size: 14px; border: 1px solid #2a2a2a; border-radius: 6px; background: #1a1a1a; color: white; outline: none; }
        .auth-box input:focus, .auth-box select:focus { border-color: #ff1e3a; }
        .auth-box button { background: #ff1e3a; color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .auth-box button:hover { background: #e01b32; }
        .auth-toggle { text-align: center; color: #ff1e3a; cursor: pointer; font-size: 13px; margin-top: 5px; }
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; font-family: sans-serif; }
        .sidebar { position: absolute; left: 10px; top: 10px; width: 60px; background: rgba(16, 16, 16, 0.85); border: 1px solid #2a2a2a; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; padding: 8px; pointer-events: auto; }
        .sidebar-btn { width: 60px; height: 60px; background: #222; border: 1px solid #333; border-radius: 6px; color: white; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; }
        .sidebar-btn:hover { background: #333; border-color: #ff1e3a; }
        .sidebar-btn.active { background: #ff1e3a; border-color: #ff1e3a; }
        .window { position: absolute; left: 90px; top: 10px; width: 320px; height: calc(100% - 40px); background: rgba(16, 16, 16, 0.9); border: 1px solid #2a2a2a; border-radius: 8px; display: none; flex-direction: column; pointer-events: auto; color: white; }
        .window-header { padding: 12px; font-weight: bold; border-bottom: 1px solid #2a2a2a; font-size: 15px; color: #ff1e3a; }
        .window-content { padding: 12px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .friend-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: #1a1a1a; border: 1px solid #2d2d2d; border-radius: 6px; }
        .friend-status { width: 8px; height: 8px; border-radius: 50%; background: #00ff66; }
        .friend-name { font-size: 13px; color: #efefef; flex: 1; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        .color-picker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .color-option { height: 35px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .color-option.selected { border-color: white; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div id="auth-screen">
        <div class="auth-box" id="login-box">
            <h2 style="color: white; margin: 0 0 10px 0; text-align: center;">Sign In</h2>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button id="btn-login">Login</button>
            <div class="auth-toggle" id="to-register">Create an account</div>
        </div>
        <div class="auth-box" id="register-box" style="display: none;">
            <h2 style="color: white; margin: 0 0 10px 0; text-align: center;">Register</h2>
            <input type="text" id="reg-username" placeholder="Username">
            <input type="password" id="reg-password" placeholder="Password">
            <select id="reg-gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            <button id="btn-register">Sign Up</button>
            <div class="auth-toggle" id="to-login">Already have an account?</div>
        </div>
    </div>
    <div id="game-ui">
        <div class="sidebar">
            <button class="sidebar-btn active" data-tab="game">GAME</button>
            <button class="sidebar-btn" data-tab="avatar">AVATAR</button>
            <button class="sidebar-btn" data-tab="profile">PROFILE</button>
            <button class="sidebar-btn" data-tab="friends">FRIENDS</button>
        </div>
        <div class="window" id="window-avatar">
            <div class="window-header">Customize Avatar</div>
            <div class="window-content">
                <div style="height: 180px; background: #000; border-radius: 6px; position: relative;" id="avatar-canvas-container"></div>
                <label style="font-size: 12px; color: #aaa;">Torso Color</label>
                <div class="color-picker-grid" id="torso-colors"></div>
                <label style="font-size: 12px; color: #aaa;">Leds Color</label>
                <div class="color-picker-grid" id="legs-colors"></div>
            </div>
        </div>
        <div class="window" id="window-profile">
            <div class="window-header">Player Profile</div>
            <div class="window-content">
                <div style="height: 150px; background: #000; border-radius: 6px;" id="profile-canvas-container"></div>
                <div style="font-size: 14px; margin-top: 10px;">Username: <span id="info-username" style="color: #ff1e3a; font-weight: bold;">-</span></div>
                <div style="font-size: 14px;">Gender: <span id="info-gender" style="color: #efefef;">-</span></div>
                <div style="font-size: 14px;">Join Date: <span id="info-date" style="color: #efefef;">-</span></div>
            </div>
        </div>
        <div class="window" id="window-friends">
            <div class="window-header">Friends (3)</div>
            <div class="window-content" id="friends-list-container">
                <div class="friend-item">
                    <div class="friend-status"></div>
                    <div class="friend-name">Marko</div>
                </div>
                <div class="friend-item">
                    <div class="friend-status"></div>
                    <div class="friend-name">Ren</div>
                </div>
                <div class="friend-item">
                    <div class="friend-status"></div>
                    <div class="friend-name">Tacs</div>
                </div>
            </div>
        </div>
    </div>
    <div id="canvas-container"></div>
    <script>
        const colorsList = ["#ff1e3a", "#00ff66", "#007bff", "#ffcc00", "#ff00ff", "#00ffff", "#ffffff", "#333333"];
        let activeTab = 'game';
        let socket;
        let localPlayer = { username: "Player", torsoColor: "#ff1e3a", legsColor: "#333333", gender: "male", joined: "Just now" };
        let currentTorsoColor = "#ff1e3a";
        let currentLegsColor = "#333333";
        let isDead = false;
        let deathTimer = 0;
        let partsVelocity = [];
        let partsRotVelocity = [];
        let remotePlayers = {};
        let scene, camera, renderer, ground;
        let avatarScene, avatarCamera, avatarRenderer, avatarTabGroup;
        let profileFullScene, profileFullCamera, profileFullRenderer, profileFullGroup;
        let playerGroup, playerModelContainer;
        let bodyParts = {};
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let playerVelocity = new THREE.Vector3();
        let isJumping = false;
        let keysPressed = {};
        let cameraAngleX = 0;
        let cameraAngleY = 0.3;
        let cameraRadius = 12;
        let clock = new THREE.Clock();
        document.getElementById('to-register').addEventListener('click', () => {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('register-box').style.display = 'flex';
        });
        document.getElementById('to-login').addEventListener('click', () => {
            document.getElementById('register-box').style.display = 'none';
            document.getElementById('login-box').style.display = 'flex';
        });
        document.getElementById('btn-login').addEventListener('click', () => {
            const u = document.getElementById('login-username').value.trim();
            if(u) {
                localPlayer.username = u;
                initGame();
            }
        });
        document.getElementById('btn-register').addEventListener('click', () => {
            const u = document.getElementById('reg-username').value.trim();
            if(u) {
                localPlayer.username = u;
                localPlayer.gender = document.getElementById('reg-gender').value;
                initGame();
            }
        });
        function initGame() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('info-username').innerText = localPlayer.username;
            document.getElementById('info-gender').innerText = localPlayer.gender;
            document.getElementById('info-date').innerText = localPlayer.joined;
            setupColorPickers();
            initThree();
            initAvatarTabScene();
            initProfileTabScene();
            setupNetwork();
            setupControls();
        }
        function setupColorPickers() {
            const tc = document.getElementById('torso-colors');
            const lc = document.getElementById('legs-colors');
            colorsList.forEach(color => {
                const opt1 = document.createElement('div');
                opt1.className = 'color-option';
                opt1.style.backgroundColor = color;
                if(color === currentTorsoColor) opt1.classList.add('selected');
                opt1.addEventListener('click', () => {
                    document.querySelectorAll('#torso-colors .color-option').forEach(e => e.classList.remove('selected'));
                    opt1.classList.add('selected');
                    currentTorsoColor = color;
                    updateLocalPlayerMaterials();
                    syncCustomization();
                });
                tc.appendChild(opt1);
                const opt2 = document.createElement('div');
                opt2.className = 'color-option';
                opt2.style.backgroundColor = color;
                if(color === currentLegsColor) opt2.classList.add('selected');
                opt2.addEventListener('click', () => {
                    document.querySelectorAll('#legs-colors .color-option').forEach(e => e.classList.remove('selected'));
                    opt2.classList.add('selected');
                    currentLegsColor = color;
                    updateLocalPlayerMaterials();
                    syncCustomization();
                });
                lc.appendChild(opt2);
            });
        }
        document.querySelectorAll('.sidebar-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.window').forEach(w => w.style.display = 'none');
                btn.classList.add('active');
                activeTab = btn.getAttribute('data-tab');
                if(activeTab !== 'game') {
                    const win = document.getElementById('window-' + activeTab);
                    if(win) win.style.display = 'flex';
                }
                if(activeTab === 'avatar') resizeAvatarCanvas();
                if(activeTab === 'profile') resizeProfileCanvas();
            });
        });
        function createCharacterMesh(torsoHex, legsHex) {
            const group = new THREE.Group();
            const headGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const headMat = new THREE.MeshLambertMaterial({ color: 0xffdbac });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 2.0;
            group.add(head);
            const torsoGeo = new THREE.BoxGeometry(1.2, 1.4, 0.6);
            const torsoMat = new THREE.MeshLambertMaterial({ color: torsoHex });
            const torso = new THREE.Mesh(torsoGeo, torsoMat);
            torso.position.y = 1.0;
            group.add(torso);
            const limbGeo = new THREE.BoxGeometry(0.4, 1.2, 0.4);
            const legsMat = new THREE.MeshLambertMaterial({ color: legsHex });
            const leftArm = new THREE.Mesh(limbGeo, headMat);
            leftArm.position.set(-0.8, 1.0, 0);
            group.add(leftArm);
            const rightArm = new THREE.Mesh(limbGeo, headMat);
            rightArm.position.set(0.8, 1.0, 0);
            group.add(rightArm);
            const leftLeg = new THREE.Mesh(limbGeo, legsMat);
            leftLeg.position.set(-0.3, -0.2, 0);
            group.add(leftLeg);
            const rightLeg = new THREE.Mesh(limbGeo, legsMat);
            rightLeg.position.set(0.3, -0.2, 0);
            group.add(rightLeg);
            return { group, head, torso, leftArm, rightArm, leftLeg, rightLeg };
        }
        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xbfe3dd);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            scene.add(dirLight);
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x557a46 });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            const grid = new THREE.GridHelper(200, 50, 0x000000, 0x444444);
            grid.position.y = 0.01;
            scene.add(grid);
            playerGroup = new THREE.Group();
            playerGroup.position.set(0, 1.3, 0);
            scene.add(playerGroup);
            playerModelContainer = new THREE.Group();
            playerGroup.add(playerModelContainer);
            bodyParts = createCharacterMesh(currentTorsoColor, currentLegsColor);
            bodyParts.group.position.y = -0.4;
            playerModelContainer.add(bodyParts.group);
        }
        function updateLocalPlayerMaterials() {
            if(bodyParts.torso) bodyParts.torso.material.color.set(currentTorsoColor);
            if(bodyParts.leftLeg) bodyParts.leftLeg.material.color.set(currentLegsColor);
            if(bodyParts.rightLeg) bodyParts.rightLeg.material.color.set(currentLegsColor);
        }
        function initAvatarTabScene() {
            const container = document.getElementById('avatar-canvas-container');
            avatarScene = new THREE.Scene();
            avatarScene.background = new THREE.Color(0x141414);
            avatarCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 10);
            avatarCamera.position.set(0, 1.2, 3.5);
            avatarCamera.lookAt(0, 1.0, 0);
            avatarRenderer = new THREE.WebGLRenderer({ antialias: true });
            avatarRenderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(avatarRenderer.domElement);
            const al = new THREE.AmbientLight(0xffffff, 0.8);
            avatarScene.add(al);
            avatarTabGroup = new THREE.Group();
            avatarScene.add(avatarTabGroup);
            refreshAvatarTabModel();
        }
        function refreshAvatarTabModel() {
            if(avatarTabGroup.children.length > 0) {
                avatarTabGroup.remove(avatarTabGroup.children[0]);
            }
            const model = createCharacterMesh(currentTorsoColor, currentLegsColor);
            avatarTabGroup.add(model.group);
        }
        function resizeAvatarCanvas() {
            const container = document.getElementById('avatar-canvas-container');
            if(!container || !avatarRenderer) return;
            avatarCamera.aspect = container.clientWidth / container.clientHeight;
            avatarCamera.updateProjectionMatrix();
            avatarRenderer.setSize(container.clientWidth, container.clientHeight);
        }
        function initProfileTabScene() {
            const container = document.getElementById('profile-canvas-container');
            profileFullScene = new THREE.Scene();
            profileFullScene.background = new THREE.Color(0x141414);
            profileFullCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 10);
            profileFullCamera.position.set(0, 1.2, 3.0);
            profileFullCamera.lookAt(0, 1.0, 0);
            profileFullRenderer = new THREE.WebGLRenderer({ antialias: true });
            profileFullRenderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(profileFullRenderer.domElement);
            const al = new THREE.AmbientLight(0xffffff, 0.8);
            profileFullScene.add(al);
            profileFullGroup = new THREE.Group();
            profileFullScene.add(profileFullGroup);
            const model = createCharacterMesh(currentTorsoColor, currentLegsColor);
            profileFullGroup.add(model.group);
        }
        function resizeProfileCanvas() {
            const container = document.getElementById('profile-canvas-container');
            if(!container || !profileFullRenderer) return;
            profileFullCamera.aspect = container.clientWidth / container.clientHeight;
            profileFullCamera.updateProjectionMatrix();
            profileFullRenderer.setSize(container.clientWidth, container.clientHeight);
        }
        function syncCustomization() {
            refreshAvatarTabModel();
            if(profileFullGroup && profileFullGroup.children[0]) {
                profileFullScene.remove(profileFullGroup);
                profileFullGroup = new THREE.Group();
                profileFullScene.add(profileFullGroup);
                const model = createCharacterMesh(currentTorsoColor, currentLegsColor);
                profileFullGroup.add(model.group);
            }
            if(socket && socket.connected) {
                socket.emit('updateAvatar', {
                    torsoColor: currentTorsoColor,
                    legsColor: currentLegsColor
                });
            }
        }
        function setupNetwork() {
            socket = io(window.location.origin, { autoConnect: false });
            socket.connect();
            socket.on('connect', () => {
                socket.emit('joinGame', {
                    username: localPlayer.username,
                    torsoColor: currentTorsoColor,
                    legsColor: currentLegsColor
                });
            });
            socket.on('currentPlayers', (players) => {
                Object.keys(players).forEach(id => {
                    if(id !== socket.id) {
                        createRemotePlayer(id, players[id]);
                    }
                });
            });
            socket.on('newPlayer', (data) => {
                createRemotePlayer(data.id, data.player);
            });
            socket.on('playerMoved', (data) => {
                if(remotePlayers[data.id]) {
                    remotePlayers[data.id].group.position.set(data.x, data.y, data.z);
                    remotePlayers[data.id].meshContainer.rotation.y = data.ry;
                    if(data.jumping) {
                        remotePlayers[data.id].parts.leftLeg.rotation.x = -Math.sin(30) * 0.5;
                        remotePlayers[data.id].parts.rightLeg.rotation.x = Math.sin(30) * 0.5;
                    } else if(data.moving) {
                        let t = Date.now() * 0.01;
                        remotePlayers[data.id].parts.leftLeg.rotation.x = Math.sin(t) * 0.5;
                        remotePlayers[data.id].parts.rightLeg.rotation.x = -Math.sin(t) * 0.5;
                    } else {
                        remotePlayers[data.id].parts.leftLeg.rotation.x = 0;
                        remotePlayers[data.id].parts.rightLeg.rotation.x = 0;
                    }
                }
            });
            socket.on('avatarUpdated', (data) => {
                if(remotePlayers[data.id]) {
                    scene.remove(remotePlayers[data.id].group);
                    createRemotePlayer(data.id, data.player);
                }
            });
            socket.on('playerDisconnected', (id) => {
                if(remotePlayers[id]) {
                    scene.remove(remotePlayers[id].group);
                    delete remotePlayers[id];
                }
            });
        }
        function createRemotePlayer(id, data) {
            const pGroup = new THREE.Group();
            pGroup.position.set(data.x || 0, data.y || 1.3, data.z || 0);
            scene.add(pGroup);
            const mContainer = new THREE.Group();
            pGroup.add(mContainer);
            const tColor = data.torsoColor || "#ffffff";
            const lColor = data.legsColor || "#ffffff";
            const rParts = createCharacterMesh(tColor, lColor);
            rParts.group.position.y = -0.4;
            mContainer.add(rParts.group);
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, 256, 64);
            ctx.font = 'bold 32px Arial';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.fillText(data.username || "Player", 128, 44);
            const txtTex = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: txtTex });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.position.y = 2.8;
            sprite.scale.set(2, 0.5, 1);
            pGroup.add(sprite);
            remotePlayers[id] = {
                group: pGroup,
                meshContainer: mContainer,
                parts: rParts,
                username: data.username
            };
        }
        function setupControls() {
            window.addEventListener('keydown', (e) => {
                keysPressed[e.code] = true;
                if(e.code === 'KeyW') moveForward = true;
                if(e.code === 'KeyS') moveBackward = true;
                if(e.code === 'KeyA') moveLeft = true;
                if(e.code === 'KeyD') moveRight = true;
                if(e.code === 'Space' && !isJumping && !isDead) {
                    playerVelocity.y = 12;
                    isJumping = true;
                }
                if(e.code === 'KeyK' && !isDead) {
                    triggerDeath();
                }
            });
            window.addEventListener('keyup', (e) => {
                keysPressed[e.code] = false;
                if(e.code === 'KeyW') moveForward = false;
                if(e.code === 'KeyS') moveBackward = false;
                if(e.code === 'KeyA') moveLeft = false;
                if(e.code === 'KeyD') moveRight = false;
            });
            let isMouseDown = false;
            let prevMouseX = 0;
            let prevMouseY = 0;
            window.addEventListener('mousedown', (e) => {
                if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT' && !e.target.closest('.window') && !e.target.closest('.sidebar')) {
                    isMouseDown = true;
                    prevMouseX = e.clientX;
                    prevMouseY = e.clientY;
                }
            });
            window.addEventListener('mousemove', (e) => {
                if(isMouseDown) {
                    let deltaX = e.clientX - prevMouseX;
                    let deltaY = e.clientY - prevMouseY;
                    cameraAngleX -= deltaX * 0.005;
                    cameraAngleY = Math.max(0.1, Math.min(Math.PI / 2 - 0.1, cameraAngleY + deltaY * 0.005));
                    prevMouseX = e.clientX;
                    prevMouseY = e.clientY;
                }
            });
            window.addEventListener('mouseup', () => { isMouseDown = false; });
        }
        function triggerDeath() {
            isDead = true;
            deathTimer = 1.0;
            partsVelocity = [];
            partsRotVelocity = [];
            const partsArray = [bodyParts.head, bodyParts.torso, bodyParts.leftArm, bodyParts.rightArm, bodyParts.leftLeg, bodyParts.rightLeg];
            partsArray.forEach(part => {
                THREE.SceneUtils.attach(part, bodyParts.group, scene);
                partsVelocity.push(new THREE.Vector3(
                    (Math.random() - 0.5) * 5,
                    Math.random() * 8 + 2,
                    (Math.random() - 0.5) * 5
                ));
                partsRotVelocity.push(new THREE.Vector3(
                    Math.random() * 10,
                    Math.random() * 10,
                    Math.random() * 10
                ));
            });
        }
        function respawnPlayer() {
            isDead = false;
            playerGroup.position.set(0, 1.3, 0);
            playerVelocity.set(0, 0, 0);
            isJumping = false;
            const partsArray = [bodyParts.head, bodyParts.torso, bodyParts.leftArm, bodyParts.rightArm, bodyParts.leftLeg, bodyParts.rightLeg];
            partsArray.forEach(part => {
                THREE.SceneUtils.detach(part, scene, bodyParts.group);
                part.rotation.set(0, 0, 0);
            });
            bodyParts.head.position.set(0, 2.0, 0);
            bodyParts.torso.position.set(0, 1.0, 0);
            bodyParts.leftArm.position.set(-0.8, 1.0, 0);
            bodyParts.rightArm.position.set(0.8, 1.0, 0);
            bodyParts.leftLeg.position.set(-0.3, -0.2, 0);
            bodyParts.rightLeg.position.set(0.3, -0.2, 0);
        }
        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();
            if(activeTab === 'game') {
                if(isDead) {
                    deathTimer -= delta;
                    const partsArray = [bodyParts.head, bodyParts.torso, bodyParts.leftArm, bodyParts.rightArm, bodyParts.leftLeg, bodyParts.rightLeg];
                    for(let i = 0; i < partsArray.length; i++) {
                        let part = partsArray[i];
                        partsVelocity[i].y -= 25 * delta;
                        part.position.addScaledVector(partsVelocity[i], delta);
                        part.rotation.x += partsRotVelocity[i].x * delta;
                        part.rotation.y += partsRotVelocity[i].y * delta;
                        part.rotation.z += partsRotVelocity[i].z * delta;
                        let bottomLimit = 0.2;
                        if(part === bodyParts.torso) bottomLimit = 0.7;
                        if(part === bodyParts.head) bottomLimit = 0.4;
                        if(part.position.y < bottomLimit) {
                            part.position.y = bottomLimit;
                            partsVelocity[i].set(0, 0, 0);
                            partsRotVelocity[i].set(0, 0, 0);
                        }
                    }
                    if(deathTimer <= 0) {
                        respawnPlayer();
                    }
                } else {
                    let camRotationMatrix = new THREE.Matrix4();
                    camRotationMatrix.makeRotationY(cameraAngleX);
                    let dirForward = new THREE.Vector3(0, 0, -1).applyMatrix4(camRotationMatrix).normalize();
                    let dirSide = new THREE.Vector3(1, 0, 0).applyMatrix4(camRotationMatrix).normalize();
                    let moveVec = new THREE.Vector3();
                    if(moveForward) moveVec.add(dirForward);
                    if(moveBackward) moveVec.add(dirForward.clone().negate());
                    if(moveLeft) moveVec.add(dirSide.clone().negate());
                    if(moveRight) moveVec.add(dirSide);
                    moveVec.normalize();
                    let targetSpeed = 8;
                    playerVelocity.x = moveVec.x * targetSpeed;
                    playerVelocity.z = moveVec.z * targetSpeed;
                    playerVelocity.y -= 32 * delta;
                    playerGroup.position.x += playerVelocity.x * delta;
                    playerGroup.position.y += playerVelocity.y * delta;
                    playerGroup.position.z += playerVelocity.z * delta;
                    let groundY = 1.3;
                    if(playerGroup.position.y <= groundY) {
                        playerGroup.position.y = groundY;
                        playerVelocity.y = 0;
                        isJumping = false;
                    }
                    if(moveVec.lengthSq() > 0.001) {
                        let angle = Math.atan2(moveVec.x, moveVec.z);
                        playerModelContainer.rotation.y = angle;
                        let t = Date.now() * 0.01;
                        bodyParts.leftLeg.rotation.x = Math.sin(t) * 0.5;
                        bodyParts.rightLeg.rotation.x = -Math.sin(t) * 0.5;
                    } else {
                        bodyParts.leftLeg.rotation.x = 0;
                        bodyParts.rightLeg.rotation.x = 0;
                    }
                }
                let relativeCamOffset = new THREE.Vector3(
                    cameraRadius * Math.sin(cameraAngleX) * Math.cos(cameraAngleY),
                    cameraRadius * Math.sin(cameraAngleY),
                    cameraRadius * Math.cos(cameraAngleX) * Math.cos(cameraAngleY)
                );
                let cameraTargetPosition = playerGroup.position.clone().add(relativeCamOffset);
                let centerTarget = playerGroup.position.clone().add(new THREE.Vector3(0, 2.0, 0));
                camera.position.copy(cameraTargetPosition);
                camera.lookAt(centerTarget);
                if(socket && socket.connected) {
                    socket.emit('playerMovement', {
                        x: playerGroup.position.x,
                        y: playerGroup.position.y,
                        z: playerGroup.position.z,
                        ry: playerModelContainer.rotation.y,
                        moving: (moveForward || moveBackward || moveLeft || moveRight) && !isDead,
                        jumping: isJumping
                    });
                }
                renderer.render(scene, camera);
            } else if(activeTab === 'avatar') {
                avatarTabGroup.rotation.y += 1 * delta;
                avatarRenderer.render(avatarScene, avatarCamera);
            } else if(activeTab === 'profile') {
                profileFullGroup.rotation.y += 1 * delta;
                profileFullRenderer.render(profileFullScene, profileFullCamera);
            }
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            resizeAvatarCanvas();
            resizeProfileCanvas();
        });
        animate();
    </script>
</body>
</html>
