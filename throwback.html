<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Multiplayer Space</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 12px; border-radius: 8px; font-family: sans-serif; font-size: 13px; z-index: 100; display: flex; flex-direction: column; gap: 6px; }
        #ui-panel label { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        #ui-panel input { cursor: pointer; border: none; background: transparent; width: 40px; height: 24px; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="ui-panel">
        <div style="font-weight:bold; text-align:center; margin-bottom:4px;">Character Colors</div>
        <label>Head <input type="color" id="col-head" value="#e0e0e0"></label>
        <label>Torso <input type="color" id="col-torso" value="#e0e0e0"></label>
        <label>L. Arm <input type="color" id="col-leftArm" value="#e0e0e0"></label>
        <label>R. Arm <input type="color" id="col-rightArm" value="#e0e0e0"></label>
        <label>L. Leg <input type="color" id="col-leftLeg" value="#e0e0e0"></label>
        <label>R. Leg <input type="color" id="col-rightLeg" value="#e0e0e0"></label>
    </div>
    <div id="canvas-container"></div>
    <script type="module">
        import * as THREE from 'three';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        const socket = io();
        const remotePlayers = {};
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(30, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.left = -25;
        dirLight.shadow.camera.right = 25;
        dirLight.shadow.camera.top = 25;
        dirLight.shadow.camera.bottom = -25;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 150;
        dirLight.shadow.bias = -0.0005;
        scene.add(dirLight);
        const cubeSize = 20;
        const cubeGeo = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
        const greenMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
        const cube = new THREE.Mesh(cubeGeo, greenMat);
        cube.position.y = -cubeSize / 2;
        cube.receiveShadow = true;
        scene.add(cube);
        const textureLoader = new THREE.TextureLoader();
        const studTextureUrl = 'https://cdn.jsdelivr.net/gh/exo-watermelon/test@main/stud.png';
        const studTexture = textureLoader.load(studTextureUrl);
        studTexture.wrapS = THREE.RepeatWrapping;
        studTexture.wrapT = THREE.RepeatWrapping;
        studTexture.minFilter = THREE.LinearMipmapLinearFilter;
        studTexture.magFilter = THREE.LinearFilter;
        studTexture.repeat.set(cubeSize, cubeSize);
        const planeGeo = new THREE.PlaneGeometry(cubeSize, cubeSize);
        const studMat = new THREE.MeshStandardMaterial({
            color: 0x228B22,
            map: studTexture,
            transparent: true,
            alphaTest: 0.1
        });
        const studsPlane = new THREE.Mesh(planeGeo, studMat);
        studsPlane.rotation.x = -Math.PI / 2;
        studsPlane.position.y = 0.01;
        studsPlane.receiveShadow = true;
        scene.add(studsPlane);
        const masters = { head: null, torso: null, limb: null };
        const partLayouts = {
            head: { pos: [0, 4.55, 0], size: [1.1, 1.1, 1.1] },
            torso: { pos: [0, 3.0, 0], size: [2, 2, 1] },
            leftArm: { pos: [-1.5, 3.0, 0], size: [1, 2, 1] },
            rightArm: { pos: [1.5, 3.0, 0], size: [1, 2, 1] },
            leftLeg: { pos: [-0.5, 1.0, 0], size: [1, 2, 1] },
            rightLeg: { pos: [0.5, 1.0, 0], size: [1, 2, 1] }
        };
        const currentLocalColors = { head: '#e0e0e0', torso: '#e0e0e0', leftArm: '#e0e0e0', rightArm: '#e0e0e0', leftLeg: '#e0e0e0', rightLeg: '#e0e0e0' };
        function createCharacterFigure(isRemote, baseColors) {
            const group = new THREE.Group();
            const parts = {};
            Object.keys(partLayouts).forEach(partName => {
                const layout = partLayouts[partName];
                const partGroup = new THREE.Group();
                partGroup.position.set(layout.pos[0], layout.pos[1], layout.pos[2]);
                let visualMesh;
                const masterKey = (partName === 'head' || partName === 'torso') ? partName : 'limb';
                const assignedColor = baseColors ? (baseColors[partName] || '#e0e0e0') : (isRemote ? '#ffa500' : '#e0e0e0');
                if (masters[masterKey]) {
                    visualMesh = masters[masterKey].clone();
                    visualMesh.traverse(child => {
                        if (child.isMesh) child.material = new THREE.MeshStandardMaterial({ color: new THREE.Color(assignedColor), side: THREE.DoubleSide });
                    });
                } else {
                    const geo = new THREE.BoxGeometry(layout.size[0], layout.size[1], layout.size[2]);
                    const mat = new THREE.MeshStandardMaterial({ color: new THREE.Color(assignedColor) });
                    visualMesh = new THREE.Mesh(geo, mat);
                }
                visualMesh.castShadow = true;
                visualMesh.receiveShadow = true;
                partGroup.add(visualMesh);
                group.add(partGroup);
                parts[partName] = partGroup;
            });
            return { group, parts };
        }
        function setupMasterModel(key, obj) {
            const box = new THREE.Box3().setFromObject(obj);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            obj.position.set(-center.x, -center.y, -center.z);
            const wrapper = new THREE.Group();
            wrapper.add(obj);
            const layoutSize = key === 'head' ? [1.1, 1.1, 1.1] : (key === 'torso' ? [2, 2, 1] : [1, 2, 1]);
            wrapper.scale.set(layoutSize[0] / size.x, layoutSize[1] / size.y, layoutSize[2] / size.z);
            masters[key] = wrapper;
        }
        function upgradePartVisual(partsObj, key, baseColors) {
            Object.keys(partsObj).forEach(partName => {
                const masterKey = (partName === 'head' || partName === 'torso') ? partName : 'limb';
                if (masterKey !== key) return;
                const partGroup = partsObj[partName];
                while (partGroup.children.length > 0) partGroup.remove(partGroup.children[0]);
                const visual = masters[key].clone();
                const col = baseColors[partName] || '#e0e0e0';
                visual.traverse(child => {
                    if (child.isMesh) {
                        child.material = new THREE.MeshStandardMaterial({ color: new THREE.Color(col), side: THREE.DoubleSide });
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                partGroup.add(visual);
            });
        }
        function upgradeAllPlayersForPart(key) {
            if (!masters[key]) return;
            Object.keys(remotePlayers).forEach(id => {
                const rp = remotePlayers[id];
                if (rp && rp.parts) upgradePartVisual(rp.parts, key, rp.colors);
            });
            if (localPlayerParts) upgradePartVisual(localPlayerParts, key, currentLocalColors);
        }
        function applyColorsToParts(partsObj, colors) {
            Object.keys(partsObj).forEach(partName => {
                const partGroup = partsObj[partName];
                const col = colors[partName] || '#e0e0e0';
                partGroup.traverse(child => {
                    if (child.isMesh) child.material.color.set(col);
                });
            });
        }
        const playerGroup = new THREE.Group();
        playerGroup.position.set(0, 0, 0);
        scene.add(playerGroup);
        const playerModelContainer = new THREE.Group();
        playerGroup.add(playerModelContainer);
        const { group: localVisualGroup, parts: localPlayerParts } = createCharacterFigure(false, currentLocalColors);
        playerModelContainer.add(localVisualGroup);
        const objLoader = new OBJLoader();
        const assets = [
            { key: 'head', url: 'https://cdn.jsdelivr.net/gh/exo-watermelon/test@main/head.obj' },
            { key: 'torso', url: 'https://cdn.jsdelivr.net/gh/exo-watermelon/test@main/torso.obj' },
            { key: 'limb', url: 'https://cdn.jsdelivr.net/gh/exo-watermelon/test@main/limb.obj' }
        ];
        assets.forEach(asset => {
            objLoader.load(asset.url, (obj) => {
                setupMasterModel(asset.key, obj);
                upgradeAllPlayersForPart(asset.key);
            }, undefined, (err) => {});
        });
        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach((id) => {
                if (id !== socket.id && !remotePlayers[id]) {
                    const { group, parts } = createCharacterFigure(true, players[id].colors);
                    scene.add(group);
                    remotePlayers[id] = { group, parts, colors: players[id].colors };
                    remotePlayers[id].group.position.set(players[id].x, players[id].y, players[id].z);
                    remotePlayers[id].group.rotation.y = players[id].ry;
                }
            });
        });
        socket.on('newPlayer', (playerInfo) => {
            if (!remotePlayers[playerInfo.id]) {
                const { group, parts } = createCharacterFigure(true, playerInfo.colors);
                scene.add(group);
                remotePlayers[playerInfo.id] = { group, parts, colors: playerInfo.colors };
                remotePlayers[playerInfo.id].group.position.set(playerInfo.x, playerInfo.y, playerInfo.z);
            }
        });
        socket.on('playerMoved', (playerInfo) => {
            if (remotePlayers[playerInfo.id]) {
                remotePlayers[playerInfo.id].group.position.set(playerInfo.x, playerInfo.y, playerInfo.z);
                remotePlayers[playerInfo.id].group.rotation.y = playerInfo.ry;
            }
        });
        socket.on('playerColorsChanged', (data) => {
            if (remotePlayers[data.id]) {
                remotePlayers[data.id].colors = data.colors;
                applyColorsToParts(remotePlayers[data.id].parts, data.colors);
            }
        });
        socket.on('playerDisconnected', (id) => {
            if (remotePlayers[id]) {
                scene.remove(remotePlayers[id].group);
                delete remotePlayers[id];
            }
        });
        ['head', 'torso', 'leftArm', 'rightArm', 'leftLeg', 'rightLeg'].forEach(part => {
            document.getElementById(`col-${part}`).addEventListener('input', (e) => {
                currentLocalColors[part] = e.target.value;
                applyColorsToParts(localPlayerParts, currentLocalColors);
                socket.emit('playerColorUpdate', currentLocalColors);
            });
        });
        let cameraDistance = 10;
        let cameraPitch = 0.3;
        let cameraYaw = 0;
        let isShiftLock = false;
        let isRightMouseDown = false;
        const keys = { w: false, a: false, s: false, d: false };
        let velocityY = 0;
        let isGrounded = true;
        const gravity = -30;
        const jumpForce = 12;
        const moveSpeed = 8;
        let lastPosition = new THREE.Vector3();
        let lastRotationY = 0;
        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key.toLowerCase() === 'w') keys.w = true;
            if (e.key.toLowerCase() === 'a') keys.a = true;
            if (e.key.toLowerCase() === 's') keys.s = true;
            if (e.key.toLowerCase() === 'd') keys.d = true;
            if (e.key === ' ') {
                if (isGrounded) {
                    velocityY = jumpForce;
                    isGrounded = false;
                }
            }
            if (e.key === 'Shift') {
                isShiftLock = !isShiftLock;
                if (isShiftLock) {
                    container.requestPointerLock();
                } else {
                    document.exitPointerLock();
                }
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'w') keys.w = false;
            if (e.key.toLowerCase() === 'a') keys.a = false;
            if (e.key.toLowerCase() === 's') keys.s = false;
            if (e.key.toLowerCase() === 'd') keys.d = false;
        });
        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.button === 2) isRightMouseDown = true;
        });
        window.addEventListener('mouseup', (e) => {
            if (e.button === 2) isRightMouseDown = false;
        });
        window.addEventListener('contextmenu', (e) => e.preventDefault());
        window.addEventListener('wheel', (e) => {
            cameraDistance += e.deltaY * 0.01;
            cameraDistance = Math.max(0, Math.min(25, cameraDistance));
        });
        window.addEventListener('mousemove', (e) => {
            if (isShiftLock || document.pointerLockElement === container || isRightMouseDown) {
                cameraYaw -= e.movementX * 0.005;
                cameraPitch -= e.movementY * 0.005;
                cameraPitch = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, cameraPitch));
            }
        });
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement !== container) isShiftLock = false;
        });
        const clock = new THREE.Clock();
        const raycaster = new THREE.Raycaster();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            velocityY += gravity * delta;
            playerGroup.position.y += velocityY * delta;
            if (playerGroup.position.y <= 0) {
                playerGroup.position.y = 0;
                velocityY = 0;
                isGrounded = true;
            }
            let moveX = 0;
            let moveZ = 0;
            if (keys.w) moveZ -= 1;
            if (keys.s) moveZ += 1;
            if (keys.a) moveX -= 1;
            if (keys.d) moveX += 1;
            const isFirstPerson = cameraDistance < 1.5;
            playerModelContainer.visible = !isFirstPerson;
            if (moveX !== 0 || moveZ !== 0) {
                const camForward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw).normalize();
                const camRight = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw).normalize();
                const moveDir = new THREE.Vector3()
                    .addScaledVector(camForward, -moveZ)
                    .addScaledVector(camRight, moveX)
                    .normalize();
                playerGroup.position.addScaledVector(moveDir, moveSpeed * delta);
                if (!isShiftLock && !isFirstPerson) {
                    const targetAngle = Math.atan2(moveDir.x, moveDir.z);
                    const currentRotation = playerModelContainer.rotation.y;
                    const deltaRotation = ((targetAngle - currentRotation + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
                    playerModelContainer.rotation.y += deltaRotation * 15 * delta;
                }
            }
            if (isShiftLock || isFirstPerson) {
                playerModelContainer.rotation.y = cameraYaw + Math.PI;
            }
            const centerTarget = new THREE.Vector3(playerGroup.position.x, playerGroup.position.y + 2.5, playerGroup.position.z);
            let cameraTargetPosition = new THREE.Vector3();
            if (isFirstPerson) {
                camera.position.copy(centerTarget);
                const lookTarget = new THREE.Vector3(
                    centerTarget.x - Math.sin(cameraYaw) * Math.cos(cameraPitch),
                    centerTarget.y + Math.sin(cameraPitch),
                    centerTarget.z - Math.cos(cameraYaw) * Math.cos(cameraPitch)
                );
                camera.lookAt(lookTarget);
            } else {
                let offsetCamDistance = cameraDistance;
                let currentYawOffset = cameraYaw;
                if (isShiftLock) {
                    const rightOffset = new THREE.Vector3(0.4, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw);
                    centerTarget.add(rightOffset);
                }
                const preferredCamPos = new THREE.Vector3(
                    centerTarget.x + offsetCamDistance * Math.sin(currentYawOffset) * Math.cos(cameraPitch),
                    centerTarget.y + offsetCamDistance * Math.sin(cameraPitch),
                    centerTarget.z + offsetCamDistance * Math.cos(currentYawOffset) * Math.cos(cameraPitch)
                );
                const rayDirection = new THREE.Vector3().subVectors(preferredCamPos, centerTarget).normalize();
                raycaster.set(centerTarget, rayDirection);
                const intersects = raycaster.intersectObject(cube);
                if (intersects.length > 0 && intersects[0].distance < offsetCamDistance) {
                    cameraTargetPosition.copy(intersects[0].point).addScaledVector(rayDirection, -0.2);
                } else {
                    cameraTargetPosition.copy(preferredCamPos);
                }
                camera.position.copy(cameraTargetPosition);
                camera.lookAt(centerTarget);
            }
            if (playerGroup.position.distanceTo(lastPosition) > 0.001 || Math.abs(playerModelContainer.rotation.y - lastRotationY) > 0.01) {
                socket.emit('playerMovement', {
                    x: playerGroup.position.x,
                    y: playerGroup.position.y,
                    z: playerGroup.position.z,
                    ry: playerModelContainer.rotation.y
                });
                lastPosition.copy(playerGroup.position);
                lastRotationY = playerModelContainer.rotation.y;
            }
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
</html>
