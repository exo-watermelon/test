    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updatePassword, deleteUser, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, runTransaction, collection, query, where, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import * as THREE from 'three';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        const firebaseConfig = {
            apiKey: "AIzaSyAoJw-xTqs_zoLj8fvehZTCixDnHjNf-g0",
            authDomain: "fourblox-89581.firebaseapp.com",
            projectId: "fourblox-89581",
            storageBucket: "fourblox-89581.firebasestorage.app",
            messagingSenderId: "976102989359",
            appId: "1:976102989359:web:7d3e40fdf23dbcb20fb0da",
            measurementId: "G-4H7GERJ41S"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let isVoting = false;
        function createNametagSprite(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 20px sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(4, 1, 1);
            return sprite;
        }
        function listenToGameVotes() {
            onSnapshot(doc(db, "games", "democube"), (docSnap) => {
                let likes = 0;
                let dislikes = 0;
                if (docSnap.exists()) {
                    likes = docSnap.data().likes || 0;
                    dislikes = docSnap.data().dislikes || 0;
                } else {
                    setDoc(doc(db, "games", "democube"), { likes: 0, dislikes: 0 });
                }
                const total = likes + dislikes;
                const pct = total > 0 ? (likes / total) * 100 : 0;
                document.getElementById('game-likes-bar').style.width = `${pct}%`;
                document.getElementById('game-likes-counter').innerText = `${likes.toLocaleString()} Likes`;
                document.getElementById('game-dislikes-counter').innerText = `${dislikes.toLocaleString()} Dislikes`;
            });
        }
        async function voteGame(isLike) {
            if (!auth.currentUser) return alert('You must be logged in to vote');
            if (isVoting) return;
            isVoting = true;
            const gameRef = doc(db, "games", "democube");
            const userVoteRef = doc(db, "games", "democube", "userVotes", auth.currentUser.uid);
            try {
                await runTransaction(db, async (transaction) => {
                    const gameSnap = await transaction.get(gameRef);
                    const voteSnap = await transaction.get(userVoteRef);
                    let likes = 0;
                    let dislikes = 0;
                    if (gameSnap.exists()) {
                        likes = gameSnap.data().likes || 0;
                        dislikes = gameSnap.data().dislikes || 0;
                    }
                    let existingVote = null;
                    if (voteSnap.exists()) {
                        existingVote = voteSnap.data().type;
                    }
                    const newVoteType = isLike ? "like" : "dislike";
                    if (existingVote === newVoteType) {
                        if (isLike) likes = Math.max(0, likes - 1);
                        else dislikes = Math.max(0, dislikes - 1);
                        transaction.delete(userVoteRef);
                    } else {
                        if (existingVote === "like") likes = Math.max(0, likes - 1);
                        if (existingVote === "dislike") dislikes = Math.max(0, dislikes - 1);
                        if (isLike) likes += 1;
                        else dislikes += 1;
                        transaction.set(userVoteRef, { type: newVoteType });
                    }
                    transaction.set(gameRef, { likes: likes, dislikes: dislikes }, { merge: true });
                });
            } catch (err) {
                alert(err.message);
            } finally {
                isVoting = false;
            }
        }
        listenToGameVotes();
        document.getElementById('btn-like-game').addEventListener('click', () => voteGame(true));
        document.getElementById('btn-dislike-game').addEventListener('click', () => voteGame(false));
        document.getElementById('to-register').addEventListener('click', () => {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('register-box').style.display = 'flex';
        });
        document.getElementById('to-login').addEventListener('click', () => {
            document.getElementById('register-box').style.display = 'none';
            document.getElementById('login-box').style.display = 'flex';
        });
        document.getElementById('btn-register').addEventListener('click', async () => {
            const username = document.getElementById('reg-user').value.trim();
            const displayName = document.getElementById('reg-display').value.trim();
            const gender = document.getElementById('reg-gender').value;
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-pass').value;
            if(!username || !email || !password) return alert('Fill in all required fields');
            try {
                const usernameLower = username.toLowerCase();
                const usernameRef = doc(db, "usernames", usernameLower);
                let registrationError = null;
                await runTransaction(db, async (transaction) => {
                    const usernameDoc = await transaction.get(usernameRef);
                    if(usernameDoc.exists()) {
                        registrationError = "Username is already taken";
                        return;
                    }
                });
                if(registrationError) return alert(registrationError);
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const counterRef = doc(db, "counters", "users");
                let nextId = 1;
                await runTransaction(db, async (transaction) => {
                    const counterDoc = await transaction.get(counterRef);
                    if(counterDoc.exists()) {
                        nextId = counterDoc.data().current + 1;
                    }
                    const now = new Date();
                    const day = String(now.getUTCDate()).padStart(2, '0');
                    const month = String(now.getUTCMonth() + 1).padStart(2, '0');
                    const year = now.getUTCFullYear();
                    const hours = String(now.getUTCHours()).padStart(2, '0');
                    const minutes = String(now.getUTCMinutes()).padStart(2, '0');
                    const seconds = String(now.getUTCSeconds()).padStart(2, '0');
                    const createdStr = `${day}/${month}/${year} ${hours}:${minutes}:${seconds} UTC`;
                    transaction.set(counterRef, { current: nextId }, { merge: true });

                    resizeAvatarCanvas();
                }
                if(activeTab === 'profile') {
                    if(currentUserData) openUserProfile(currentUserData);
                }
            });
        });
        function resizeAvatarCanvas() {
            const pane = document.getElementById('avatar-preview-pane');
            if(pane.clientWidth > 0 && pane.clientHeight > 0) {
                avatarCamera.aspect = pane.clientWidth / pane.clientHeight;
                avatarCamera.updateProjectionMatrix();
                avatarRenderer.setSize(pane.clientWidth, pane.clientHeight);
            }
        }
        function resizeProfileDashboardCanvas() {
            const pane = document.getElementById('dashboard-avatar-container');
            if(pane.clientWidth > 0 && pane.clientHeight > 0) {
                profileDashboardCamera.aspect = pane.clientWidth / pane.clientHeight;
                profileDashboardCamera.updateProjectionMatrix();
                profileDashboardRenderer.setSize(pane.clientWidth, pane.clientHeight);
            }
        }
        const clock = new THREE.Clock();
        const raycaster = new THREE.Raycaster();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if(activeTab === 'home') {
                velocityY += gravity * delta;
                playerGroup.position.y += velocityY * delta;
                if (playerGroup.position.y <= 0) {
                    playerGroup.position.y = 0;
                    velocityY = 0;
                    isGrounded = true;
                }
                let moveX = 0;
                let moveZ = 0;
                if (keys.w) moveZ -= 1;
                if (keys.s) moveZ += 1;
                if (keys.a) moveX -= 1;
                if (keys.d) moveX += 1;
                const isFirstPerson = cameraDistance < 1.5;
                playerModelContainer.visible = !isFirstPerson;
                if (moveX !== 0 || moveZ !== 0) {
                    const camForward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw).normalize();
                    const camRight = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw).normalize();
                    const moveDir = new THREE.Vector3()
                        .addScaledVector(camForward, -moveZ)
                        .addScaledVector(camRight, moveX)
                        .normalize();
                    playerGroup.position.addScaledVector(moveDir, moveSpeed * delta);
                    if (!isShiftLock && !isFirstPerson) {
                        const targetAngle = Math.atan2(moveDir.x, moveDir.z);
                        const currentRotation = playerModelContainer.rotation.y;
                        const deltaRotation = ((targetAngle - currentRotation + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
                        playerModelContainer.rotation.y += deltaRotation * 15 * delta;
                    }
                }
                if (isShiftLock || isFirstPerson) {
                    playerModelContainer.rotation.y = cameraYaw + Math.PI;
                }
                const centerTarget = new THREE.Vector3(playerGroup.position.x, playerGroup.position.y + 2.5, playerGroup.position.z);
                let cameraTargetPosition = new THREE.Vector3();
                if (isFirstPerson) {
                    camera.position.copy(centerTarget);
                    const lookTarget = new THREE.Vector3(
                        centerTarget.x - Math.sin(cameraYaw) * Math.cos(cameraPitch),
                        centerTarget.y + Math.sin(cameraPitch),
                        centerTarget.z - Math.cos(cameraYaw) * Math.cos(cameraPitch)
                    );
                    camera.lookAt(lookTarget);
                } else {
                    let offsetCamDistance = cameraDistance;
                    let currentYawOffset = cameraYaw;
                    if (isShiftLock) {
                        const rightOffset = new THREE.Vector3(0.4, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw);
                        centerTarget.add(rightOffset);
                    }
                    const preferredCamPos = new THREE.Vector3(
                        centerTarget.x + offsetCamDistance * Math.sin(currentYawOffset) * Math.cos(cameraPitch),
                        centerTarget.y + offsetCamDistance * Math.sin(cameraPitch),
                        centerTarget.z + offsetCamDistance * Math.cos(currentYawOffset) * Math.cos(cameraPitch)
                    );
                    raycaster.set(centerTarget, new THREE.Vector3().subVectors(preferredCamPos, centerTarget).normalize());
                    const intersects = raycaster.intersectObject(cube);
                    if (intersects.length > 0 && intersects[0].distance < offsetCamDistance) {
                        cameraTargetPosition.copy(intersects[0].point).addScaledVector(new THREE.Vector3().subVectors(preferredCamPos, centerTarget).normalize(), -0.2);
                    } else {
                        cameraTargetPosition.copy(preferredCamPos);
                    }
                    camera.position.copy(cameraTargetPosition);
                    camera.lookAt(centerTarget);
                }
                if (playerGroup.position.distanceTo(lastPosition) > 0.001 || Math.abs(playerModelContainer.rotation.y - lastRotationY) > 0.01) {
                    if(socket && socket.connected) {
                        socket.emit('playerMovement', {
                            x: playerGroup.position.x,
                            y: playerGroup.position.y,
                            z: playerGroup.position.z,
                            ry: playerModelContainer.rotation.y
                        });
                    }
                    lastPosition.copy(playerGroup.position);
                    lastRotationY = playerModelContainer.rotation.y;
                }
                renderer.render(scene, camera);
            } else if(activeTab === 'avatar') {
                avatarTabGroup.rotation.y += 1 * delta;
                avatarRenderer.render(avatarScene, avatarCamera);
            } else if(activeTab === 'profile' && profileDashboardGroup) {
                profileDashboardRenderer.render(profileDashboardScene, profileDashboardCamera);
            }
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            resizeAvatarCanvas();
            resizeProfileDashboardCanvas();
        });
        animate();
    </script>
</body>
</html>
