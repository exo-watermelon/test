<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fourblox</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f3f3f3; font-family: Arial, sans-serif; color: #000000; overflow-x: hidden; }
        #auth-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #0c0c0c; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-box { padding: 35px; background: #141414; border: 2px solid #ff1e3a; border-radius: 12px; width: 340px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 0 20px rgba(255, 30, 58, 0.2); }
        .auth-box input, .auth-box select, .auth-box button { padding: 12px; font-size: 14px; border: 1px solid #2a2a2a; border-radius: 6px; background: #1a1a1a; color: white; outline: none; }
        .auth-box input:focus, .auth-box select:focus { border-color: #ff1e3a; }
        .auth-box button { background: #ff1e3a; font-weight: bold; cursor: pointer; border: none; transition: background 0.2s; }
        .auth-box button:hover { background: #e0122b; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; font-family: Arial, sans-serif; }
        .interactive { pointer-events: auto; }
        #nav-bar { position: absolute; top: 0; left: 0; width: 100%; height: 45px; background: #1b1b1b; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; border-bottom: 2px solid #2b2b2b; }
        .nav-tab { color: #ccc; padding: 0 15px; height: 100%; display: flex; align-items: center; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; border-bottom: 3px solid transparent; }
        .nav-tab:hover { color: #fff; background: #252525; }
        .nav-tab.active { color: #fff; border-bottom-color: #ff1e3a; background: #252525; }
        .tab-content { position: absolute; top: 45px; left: 0; width: 100%; height: calc(100% - 45px); display: none; }
        .tab-content.active { display: block; }
        #game-tab { width: 100%; height: 100%; }
        #avatar-tab { background: #f0f0f0; padding: 20px; box-sizing: border-box; display: none; gap: 20px; }
        #profile-tab { background: #f0f0f0; padding: 20px; box-sizing: border-box; display: none; }
        .avatar-container { display: flex; width: 100%; height: 100%; gap: 20px; }
        .avatar-preview { flex: 1; background: #fff; border: 1px solid #ccc; border-radius: 8px; position: relative; }
        .avatar-customizer { width: 400px; background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .customizer-section { display: flex; flex-direction: column; gap: 8px; }
        .customizer-section h3 { margin: 0; font-size: 16px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .color-btn { width: 100%; aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; }
        .color-btn:hover { transform: scale(1.05); }
        .item-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .item-card { border: 1px solid #ddd; border-radius: 6px; padding: 10px; text-align: center; cursor: pointer; background: #fafafa; }
        .item-card:hover { border-color: #ff1e3a; background: #f5f5f5; }
        .item-card img { width: 50px; height: 50px; object-fit: contain; }
        .item-card.equipped { border-color: #ff1e3a; background: #fff0f1; }
        .profile-box { background: white; border: 1px solid #ccc; border-radius: 8px; padding: 30px; max-width: 600px; margin: 0 auto; display: flex; gap: 30px; }
        .profile-avatar-view { width: 200px; height: 250px; background: #e0e0e0; border-radius: 6px; }
        .profile-info { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .profile-info h2 { margin: 0; font-size: 24px; color: #111; }
        .profile-info p { margin: 0; color: #666; font-size: 14px; }
        .stat-box { display: flex; gap: 20px; margin-top: 10px; }
        .stat-item { background: #f5f5f5; padding: 10px 15px; border-radius: 6px; text-align: center; flex: 1; }
        .stat-val { font-size: 18px; font-weight: bold; color: #ff1e3a; }
        .stat-lbl { font-size: 11px; color: #888; text-transform: uppercase; }
        #chat-area { position: absolute; bottom: 150px; left: 20px; width: 320px; height: 200px; background: rgba(0,0,0,0.3); border-radius: 4px; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; }
        #chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; color: white; font-size: 13px; text-shadow: 1px 1px 1px #000; }
        #chat-input { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 8px; color: white; font-size: 13px; outline: none; margin-top: 5px; }
        #chat-input:focus { border-color: #ff1e3a; }
        #leaderboard { position: absolute; top: 65px; right: 20px; width: 200px; background: rgba(0,0,0,0.5); border-radius: 6px; padding: 10px; box-sizing: border-box; color: white; font-size: 13px; }
        .lb-title { font-weight: bold; text-align: center; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 4px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .lb-row { display: flex; justify-content: space-between; padding: 3px 0; }
        .lb-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px; }
        .lb-score { font-weight: bold; color: #ff1e3a; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color: white; margin: 0; text-align: center; font-size: 24px; letter-spacing: 1px;">FOURBLOX</h2>
            <input type="text" id="username-input" placeholder="Username" maxlength="15">
            <select id="char-color-select">
                <option value="#ff1e3a">Red</option>
                <option value="#1eff5a">Green</option>
                <option value="#1e5aff">Blue</option>
                <option value="#ffea1e">Yellow</option>
                <option value="#ff1eff">Purple</option>
            </select>
            <button id="login-btn">PLAY</button>
        </div>
    </div>
    <div id="ui-container">
        <div id="nav-bar" class="interactive">
            <div class="nav-tab active" data-tab="game">Game</div>
            <div class="nav-tab" data-tab="avatar">Avatar</div>
            <div class="nav-tab" data-tab="profile">Profile</div>
        </div>
        <div id="game-tab" class="tab-content active">
            <div id="chat-area" class="interactive">
                <div id="chat-messages"></div>
                <input type="text" id="chat-input" placeholder="Press '/' to chat..." maxlength="50">
            </div>
            <div id="leaderboard">
                <div class="lb-title">Players</div>
                <div id="lb-list"></div>
            </div>
        </div>
        <div id="avatar-tab" class="tab-content">
            <div class="avatar-container interactive">
                <div class="avatar-preview" id="avatar-canvas-container"></div>
                <div class="avatar-customizer">
                    <div class="customizer-section">
                        <h3>Skin Tone</h3>
                        <div class="color-grid" id="skin-color-grid"></div>
                    </div>
                    <div class="customizer-section">
                        <h3>Torso Color</h3>
                        <div class="color-grid" id="torso-color-grid"></div>
                    </div>
                    <div class="customizer-section">
                        <h3>Hats</h3>
                        <div class="item-grid" id="hats-grid"></div>
                    </div>
                </div>
            </div>
        </div>
        <div id="profile-tab" class="tab-content">
            <div class="profile-box interactive">
                <div class="profile-avatar-view" id="profile-canvas-container"></div>
                <div class="profile-info">
                    <h2 id="profile-username">Player</h2>
                    <p id="profile-joined">Joined: Just Now</p>
                    <div class="stat-box">
                        <div class="stat-item">
                            <div class="stat-val" id="profile-ko">0</div>
                            <div class="stat-lbl">Wipeouts</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-val" id="profile-wo">0</div>
                            <div class="stat-lbl">Visits</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let scene, camera, renderer, activeTab = 'game';
        let playerGroup, playerParts = {}, keys = {}, moveSpeed = 12, jumpStrength = 14, gravity = 35, yVelocity = 0, isGrounded = false;
        let blocks = [], remotePlayers = new Map(), localUsername = 'Player', localColor = '#ff1e3a';
        let currentSkinColor = '#f5ca93', currentTorsoColor = '#ff1e3a', equippedHat = null;
        let socket, playerId = Math.random().toString(36).substr(2, 9);
        let avatarScene, avatarCamera, avatarRenderer, avatarTabGroup;
        let profilePageScene, profilePageCamera, profilePageRenderer, profilePageGroup;
        let microScenes = [];
        const skinColors = ['#f5ca93', '#e0a96d', '#ffdbac', '#8d5524', '#c68642', '#ffea1e', '#1e5aff'];
        const torsoColors = ['#ff1e3a', '#1eff5a', '#1e5aff', '#ffea1e', '#ff1eff', '#ffffff', '#111111'];
        const hatsData = [
            { id: 'fedora', name: 'Fedora', color: '#222222', type: 'fedora' },
            { id: 'cap', name: 'Visor', color: '#ff1e3a', type: 'cap' },
            { id: 'horns', name: 'Horns', color: '#ff1e3a', type: 'horns' }
        ];
        document.getElementById('login-btn').addEventListener('click', () => {
            let userIn = document.getElementById('username-input').value.trim();
            if(userIn) localUsername = userIn;
            localColor = document.getElementById('char-color-select').value;
            currentTorsoColor = localColor;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('ui-container').style.display = 'block';
            initGame();
            setupMultiplayer();
        });
        document.querySelectorAll('.nav-bar .nav-tab, #nav-bar .nav-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                activeTab = tab.getAttribute('data-tab');
                document.getElementById(`${activeTab}-tab`).classList.add('active');
                if(activeTab === 'avatar') {
                    resizeAvatarCanvas();
                    updateAvatarTabModel();
                } else if(activeTab === 'profile') {
                    resizeAvatarCanvas();
                    updateProfileTabModel();
                }
            });
        });
        function createCharacterModel(skin, torso, hatId) {
            let group = new THREE.Group();
            let parts = {};
            let headGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            let headMat = new THREE.MeshLambertMaterial({ color: skin });
            parts.head = new THREE.Mesh(headGeo, headMat);
            parts.head.position.y = 2.1;
            group.add(parts.head);
            let torsoGeo = new THREE.BoxGeometry(2, 2, 1);
            let torsoMat = new THREE.MeshLambertMaterial({ color: torso });
            parts.torso = new THREE.Mesh(torsoGeo, torsoMat);
            parts.torso.position.y = 0.5;
            group.add(parts.torso);
            let armGeo = new THREE.BoxGeometry(0.8, 2, 0.8);
            let armMat = new THREE.MeshLambertMaterial({ color: skin });
            parts.leftArm = new THREE.Mesh(armGeo, armMat);
            parts.leftArm.position.set(-1.4, 0.5, 0);
            parts.leftArm.geometry.translate(0, -0.5, 0);
            parts.leftArm.position.y += 0.5;
            group.add(parts.leftArm);
            parts.rightArm = new THREE.Mesh(armGeo, armMat);
            parts.rightArm.position.set(1.4, 0.5, 0);
            parts.rightArm.geometry.translate(0, -0.5, 0);
            parts.rightArm.position.y += 0.5;
            group.add(parts.rightArm);
            let legGeo = new THREE.BoxGeometry(0.9, 2, 0.9);
            let legMat = new THREE.MeshLambertMaterial({ color: '#111111' });
            parts.leftLeg = new THREE.Mesh(legGeo, legMat);
            parts.leftLeg.position.set(-0.55, -1.5, 0);
            parts.leftLeg.geometry.translate(0, -0.5, 0);
            parts.leftLeg.position.y += 0.5;
            group.add(parts.leftLeg);
            parts.rightLeg = new THREE.Mesh(legGeo, legMat);
            parts.rightLeg.position.set(0.55, -1.5, 0);
            parts.rightLeg.geometry.translate(0, -0.5, 0);
            parts.rightLeg.position.y += 0.5;
            group.add(parts.rightLeg);
            if(hatId) {
                let hatGroup = createHatMesh(hatId);
                hatGroup.position.y = 0.6;
                parts.head.add(hatGroup);
                parts.hat = hatGroup;
            }
            return { group, parts };
        }
        function createHatMesh(hatId) {
            let hatGroup = new THREE.Group();
            let hatData = hatsData.find(h => h.id === hatId);
            let color = hatData ? hatData.color : '#222222';
            let mat = new THREE.MeshLambertMaterial({ color: color });
            if(hatId === 'fedora') {
                let brim = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 2), mat);
                brim.position.y = 0.1;
                let crown = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.6, 1.3), mat);
                crown.position.y = 0.4;
                hatGroup.add(brim, crown);
            } else if(hatId === 'cap') {
                let crown = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.6, 1.3), mat);
                crown.position.y = 0.3;
                let visor = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.05, 0.7), mat);
                visor.position.set(0, 0.1, 0.8);
                hatGroup.add(crown, visor);
            } else if(hatId === 'horns') {
                let hornL = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.8, 4), mat);
                hornL.position.set(-0.5, 0.5, 0);
                hornL.rotation.z = -0.3;
                let hornR = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.8, 4), mat);
                hornR.position.set(0.5, 0.5, 0);
                hornR.rotation.z = 0.3;
                hatGroup.add(hornL, hornR);
            }
            return hatGroup;
        }
        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#80a0ff');
            scene.fog = new THREE.FogExp2('#80a0ff', 0.015);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('game-tab').appendChild(renderer.domElement);
            let ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            let dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 150;
            let d = 40;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            scene.add(dirLight);
            let floorGeo = new THREE.PlaneGeometry(200, 200);
            let floorMat = new THREE.MeshLambertMaterial({ color: '#3e7033' });
            let floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);
            let grid = new THREE.GridHelper(200, 100, '#4f8543', '#4f8543');
            grid.position.y = 0.01;
            scene.add(grid);
            let pData = createCharacterModel(currentSkinColor, currentTorsoColor, equippedHat);
            playerGroup = pData.group;
            playerParts = pData.parts;
            playerGroup.position.set(0, 2.5, 0);
            scene.add(playerGroup);
            createMap();
            window.addEventListener('keydown', e => {
                if(document.activeElement === document.getElementById('chat-input')) return;
                keys[e.key.toLowerCase()] = true;
                if(e.key === '/') {
                    e.preventDefault();
                    document.getElementById('chat-input').focus();
                }
                if(e.key === ' ' && isGrounded) {
                    yVelocity = jumpStrength;
                    isGrounded = false;
                }
            });
            window.addEventListener('keyup', e => {
                keys[e.key.toLowerCase()] = false;
            });
            setupChat();
            setupAvatarTab();
            setupProfileTab();
        }
        function createMap() {
            let blockData = [
                { size: [4, 2, 4], pos: [10, 1, 10], color: '#ffea1e' },
                { size: [6, 4, 6], pos: [-15, 2, 15], color: '#ff1e3a' },
                { size: [8, 6, 4], pos: [0, 3, -20], color: '#1e5aff' },
                { size: [4, 1, 12], pos: [25, 0.5, -5], color: '#ff1eff' },
                { size: [5, 8, 5], pos: [-20, 4, -15], color: '#1eff5a' },
                { size: [3, 3, 3], pos: [10, 3.5, 10], color: '#ffffff' },
                { size: [2, 2, 2], pos: [10, 6, 10], color: '#111111' }
            ];
            blockData.forEach(data => {
                let geo = new THREE.BoxGeometry(...data.size);
                let mat = new THREE.MeshLambertMaterial({ color: data.color });
                let box = new THREE.Mesh(geo, mat);
                box.position.set(...data.pos);
                box.castShadow = true;
                box.receiveShadow = true;
                scene.add(box);
                box.userData = { size: data.size };
                blocks.push(box);
            });
        }
        function checkCollision(axis) {
            let playerBox = new THREE.Box3().setFromObject(playerGroup);
            blocks.forEach(block => {
                let blockBox = new THREE.Box3().setFromObject(block);
                if(playerBox.intersectsBox(blockBox)) {
                    let overlapX = Math.min(playerBox.max.x, blockBox.max.x) - Math.max(playerBox.min.x, blockBox.min.x);
                    let overlapY = Math.min(playerBox.max.y, blockBox.max.y) - Math.max(playerBox.min.y, blockBox.min.y);
                    let overlapZ = Math.min(playerBox.max.z, blockBox.max.z) - Math.max(playerBox.min.z, blockBox.min.z);
                    if(axis === 'y') {
                        if(playerGroup.position.y > block.position.y) {
                            playerGroup.position.y += overlapY;
                            yVelocity = 0;
                            isGrounded = true;
                        } else {
                            playerGroup.position.y -= overlapY;
                            yVelocity = 0;
                        }
                        playerBox.setFromObject(playerGroup);
                    } else if(axis === 'x') {
                        if(playerGroup.position.x > block.position.x) {
                            playerGroup.position.x += overlapX;
                        } else {
                            playerGroup.position.x -= overlapX;
                        }
                        playerBox.setFromObject(playerGroup);
                    } else if(axis === 'z') {
                        if(playerGroup.position.z > block.position.z) {
                            playerGroup.position.z += overlapZ;
                        } else {
                            playerGroup.position.z -= overlapZ;
                        }
                        playerBox.setFromObject(playerGroup);
                    }
                }
            });
            if(playerGroup.position.y < -10) {
                playerGroup.position.set(0, 5, 0);
                yVelocity = 0;
                isGrounded = false;
            }
        }
        let clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            let delta = Math.min(clock.getDelta(), 0.1);
            if(activeTab === 'game' && playerGroup) {
                let moveX = 0;
                let moveZ = 0;
                let speed = moveSpeed * delta;
                if(keys['w']) { moveX -= Math.sin(playerGroup.rotation.y) * speed; moveZ -= Math.cos(playerGroup.rotation.y) * speed; }
                if(keys['s']) { moveX += Math.sin(playerGroup.rotation.y) * speed; moveZ += Math.cos(playerGroup.rotation.y) * speed; }
                if(keys['a']) { moveX -= Math.cos(playerGroup.rotation.y) * speed; moveZ += Math.sin(playerGroup.rotation.y) * speed; }
                if(keys['d']) { moveX += Math.cos(playerGroup.rotation.y) * speed; moveZ -= Math.sin(playerGroup.rotation.y) * speed; }
                if(keys['arrowleft']) playerGroup.rotation.y += 2.5 * delta;
                if(keys['arrowright']) playerGroup.rotation.y -= 2.5 * delta;
                playerGroup.position.x += moveX;
                checkCollision('x');
                playerGroup.position.z += moveZ;
                checkCollision('z');
                yVelocity -= gravity * delta;
                playerGroup.position.y += yVelocity * delta;
                if(playerGroup.position.y <= 2.5) {
                    playerGroup.position.y = 2.5;
                    yVelocity = 0;
                    isGrounded = true;
                } else {
                    isGrounded = false;
                }
                checkCollision('y');
                let isMoving = Math.abs(moveX) > 0 || Math.abs(moveZ) > 0;
                if(!isGrounded) {
                    playerParts.leftArm.rotation.x = 3.14;
                    playerParts.rightArm.rotation.x = 3.14;
                    playerParts.leftLeg.rotation.x = 0;
                    playerParts.rightLeg.rotation.x = 0;
                } else if(isMoving) {
                    let angle = Math.sin(Date.now() * 0.01) * 0.5;
                    playerParts.leftArm.rotation.x = angle;
                    playerParts.rightArm.rotation.x = -angle;
                    playerParts.leftLeg.rotation.x = -angle;
                    playerParts.rightLeg.rotation.x = angle;
                } else {
                    playerParts.leftArm.rotation.x = 0;
                    playerParts.rightArm.rotation.x = 0;
                    playerParts.leftLeg.rotation.x = 0;
                    playerParts.rightLeg.rotation.x = 0;
                }
                let targetCamX = playerGroup.position.x + Math.sin(playerGroup.rotation.y) * 15;
                let targetCamZ = playerGroup.position.z + Math.cos(playerGroup.rotation.y) * 15;
                let targetCamY = playerGroup.position.y + 8;
                camera.position.x += (targetCamX - camera.position.x) * 0.1;
                camera.position.y += (targetCamY - camera.position.y) * 0.1;
                camera.position.z += (targetCamZ - camera.position.z) * 0.1;
                camera.lookAt(playerGroup.position.x, playerGroup.position.y + 1.5, playerGroup.position.z);
                remotePlayers.forEach(rp => {
                    if(rp.group) {
                        let distY = Math.abs(rp.group.position.y - rp.prevPosition.y);
                        let distX = Math.abs(rp.group.position.x - rp.prevPosition.x);
                        let distZ = Math.abs(rp.group.position.z - rp.prevPosition.z);
                        let distH = Math.sqrt(distX * distX + distZ * distZ);
                        if(distY > 0.01) {
                            rp.parts.leftArm.rotation.x = 3.14;
                            rp.parts.rightArm.rotation.x = 3.14;
                            rp.parts.leftLeg.rotation.x = 0;
                            rp.parts.rightLeg.rotation.x = 0;
                        } else if(distH > 0.01) {
                            let angle = Math.sin(Date.now() * 0.01) * 0.5;
                            rp.parts.leftArm.rotation.x = angle;
                            rp.parts.rightArm.rotation.x = -angle;
                            rp.parts.leftLeg.rotation.x = -angle;
                            rp.parts.rightLeg.rotation.x = angle;
                        } else {
                            rp.parts.leftArm.rotation.x = 0;
                            rp.parts.rightArm.rotation.x = 0;
                            rp.parts.leftLeg.rotation.x = 0;
                            rp.parts.rightLeg.rotation.x = 0;
                        }
                        rp.prevPosition.copy(rp.group.position);
                    }
                });
                renderer.render(scene, camera);
            } else if(activeTab === 'avatar') {
                avatarTabGroup.rotation.y += 1 * delta;
                avatarRenderer.render(avatarScene, avatarCamera);
            }
            if(activeTab === 'profile' && profilePageGroup) {
                profilePageGroup.rotation.y += 1 * delta;
                profilePageRenderer.render(profilePageScene, profilePageCamera);
            }
            microScenes.forEach(m => {
                m.group.rotation.y = 0.2;
                m.renderer.render(m.scene, m.camera);
            });
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            resizeAvatarCanvas();
            updateMicroRenderers();
        });
        function setupMultiplayer() {
            socket = new WebSocket('wss://echo.websocket.org');
            socket.onopen = () => {
                let joinMsg = {
                    type: 'join',
                    id: playerId,
                    username: localUsername,
                    color: currentTorsoColor,
                    skin: currentSkinColor,
                    hat: equippedHat,
                    pos: [playerGroup.position.x, playerGroup.position.y, playerGroup.position.z],
                    rot: playerGroup.rotation.y
                };
                socket.send(JSON.stringify(joinMsg));
            };
            socket.onmessage = (event) => {
                try {
                    let msg = JSON.parse(event.data);
                    if(msg.id === playerId) return;
                    if(msg.type === 'join') {
                        createRemotePlayer(msg);
                        let reply = {
                            type: 'reply',
                            id: playerId,
                            username: localUsername,
                            color: currentTorsoColor,
                            skin: currentSkinColor,
                            hat: equippedHat,
                            pos: [playerGroup.position.x, playerGroup.position.y, playerGroup.position.z],
                            rot: playerGroup.rotation.y
                        };
                        socket.send(JSON.stringify(reply));
                    } else if(msg.type === 'reply') {
                        createRemotePlayer(msg);
                    } else if(msg.type === 'move') {
                        let rp = remotePlayers.get(msg.id);
                        if(rp) {
                            rp.group.position.set(...msg.pos);
                            rp.group.rotation.y = msg.rot;
                        }
                    } else if(msg.type === 'chat') {
                        addChatMessage(msg.username, msg.text);
                    } else if(msg.type === 'leave') {
                        let rp = remotePlayers.get(msg.id);
                        if(rp) {
                            scene.remove(rp.group);
                            remotePlayers.delete(msg.id);
                            updateLeaderboard();
                        }
                    }
                } catch(e) {}
            };
            setInterval(() => {
                if(socket && socket.readyState === WebSocket.OPEN && playerGroup) {
                    let moveMsg = {
                        type: 'move',
                        id: playerId,
                        pos: [playerGroup.position.x, playerGroup.position.y, playerGroup.position.z],
                        rot: playerGroup.rotation.y
                    };
                    socket.send(JSON.stringify(moveMsg));
                }
            }, 50);
        }
        function createRemotePlayer(data) {
            if(remotePlayers.has(data.id)) return;
            let pData = createCharacterModel(data.skin || '#f5ca93', data.color || '#ff1e3a', data.hat);
            pData.group.position.set(...data.pos);
            pData.group.rotation.y = data.rot;
            scene.add(pData.group);
            pData.prevPosition = new THREE.Vector3().fromArray(data.pos);
            pData.username = data.username;
            remotePlayers.set(data.id, pData);
            updateLeaderboard();
            addChatMessage('System', `${data.username} joined the game.`);
        }
        function setupChat() {
            let input = document.getElementById('chat-input');
            input.addEventListener('keydown', (e) => {
                if(e.key === 'Enter') {
                    let text = input.value.trim();
                    if(text) {
                        addChatMessage(localUsername, text);
                        if(socket && socket.readyState === WebSocket.OPEN) {
                            socket.send(JSON.stringify({
                                type: 'chat',
                                id: playerId,
                                username: localUsername,
                                text: text
                            }));
                        }
                    }
                    input.value = '';
                    input.blur();
                }
            });
        }
        function addChatMessage(user, text) {
            let container = document.getElementById('chat-messages');
            let msg = document.createElement('div');
            msg.innerHTML = `<strong>${user}:</strong> ${text}`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
            if(container.children.length > 30) container.removeChild(container.children[0]);
        }
        function updateLeaderboard() {
            let list = document.getElementById('lb-list');
            list.innerHTML = '';
            let row = document.createElement('div');
            row.className = 'lb-row';
            row.innerHTML = `<span class="lb-name">${localUsername}</span><span class="lb-score">0</span>`;
            list.appendChild(row);
            remotePlayers.forEach(rp => {
                let r = document.createElement('div');
                r.className = 'lb-row';
                r.innerHTML = `<span class="lb-name">${rp.username}</span><span class="lb-score">0</span>`;
                list.appendChild(r);
            });
        }
        function setupAvatarTab() {
            let container = document.getElementById('avatar-canvas-container');
            avatarScene = new THREE.Scene();
            avatarScene.background = new THREE.Color('#e8e8e8');
            avatarCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
            avatarCamera.position.set(0, 2, 6);
            avatarCamera.lookAt(0, 1, 0);
            avatarRenderer = new THREE.WebGLRenderer({ antialias: true });
            container.appendChild(avatarRenderer.domElement);
            let amb = new THREE.AmbientLight(0xffffff, 0.7);
            avatarScene.add(amb);
            let dir = new THREE.DirectionalLight(0xffffff, 0.5);
            dir.position.set(5, 10, 5);
            avatarScene.add(dir);
            let skinGrid = document.getElementById('skin-color-grid');
            skinColors.forEach(c => {
                let btn = document.createElement('div');
                btn.className = 'color-btn';
                btn.style.backgroundColor = c;
                btn.addEventListener('click', () => {
                    currentSkinColor = c;
                    updateAvatarTabModel();
                    updateLocalPlayerModel();
                });
                skinGrid.appendChild(btn);
            });
            let torsoGrid = document.getElementById('torso-color-grid');
            torsoColors.forEach(c => {
                let btn = document.createElement('div');
                btn.className = 'color-btn';
                btn.style.backgroundColor = c;
                btn.addEventListener('click', () => {
                    currentTorsoColor = c;
                    updateAvatarTabModel();
                    updateLocalPlayerModel();
                });
                torsoGrid.appendChild(btn);
            });
            let hatGrid = document.getElementById('hats-grid');
            hatsData.forEach(h => {
                let card = document.createElement('div');
                card.className = 'item-card';
                card.id = `hat-${h.id}`;
                card.innerHTML = `<div style="font-size:12px;font-weight:bold;margin-bottom:5px;">${h.name}</div>`;
                let canvasCont = document.createElement('div');
                canvasCont.style.width = '100px';
                canvasCont.style.height = '60px';
                canvasCont.style.margin = '0 auto';
                card.appendChild(canvasCont);
                hatGrid.appendChild(card);
                createMicroScene(canvasCont, h.id);
                card.addEventListener('click', () => {
                    if(equippedHat === h.id) {
                        equippedHat = null;
                        card.classList.remove('equipped');
                    } else {
                        document.querySelectorAll('.item-card').forEach(c => c.classList.remove('equipped'));
                        equippedHat = h.id;
                        card.classList.add('equipped');
                    }
                    updateAvatarTabModel();
                    updateLocalPlayerModel();
                });
            });
        }
        function resizeAvatarCanvas() {
            let ac = document.getElementById('avatar-canvas-container');
            if(ac && avatarRenderer) {
                let w = ac.clientWidth;
                let h = ac.clientHeight;
                avatarCamera.aspect = w / h;
                avatarCamera.updateProjectionMatrix();
                avatarRenderer.setSize(w, h);
            }
            let pc = document.getElementById('profile-canvas-container');
            if(pc && profilePageRenderer) {
                let w = pc.clientWidth;
                let h = pc.clientHeight;
                profilePageCamera.aspect = w / h;
                profilePageCamera.updateProjectionMatrix();
                profilePageRenderer.setSize(w, h);
            }
        }
        function updateAvatarTabModel() {
            if(avatarTabGroup) avatarScene.remove(avatarTabGroup);
            let pData = createCharacterModel(currentSkinColor, currentTorsoColor, equippedHat);
            avatarTabGroup = pData.group;
            avatarTabGroup.position.y = -0.5;
            avatarScene.add(avatarTabGroup);
        }
        function updateLocalPlayerModel() {
            if(!playerGroup) return;
            let oldPos = playerGroup.position.clone();
            let oldRot = playerGroup.rotation.y;
            scene.remove(playerGroup);
            let pData = createCharacterModel(currentSkinColor, currentTorsoColor, equippedHat);
            playerGroup = pData.group;
            playerParts = pData.parts;
            playerGroup.position.copy(oldPos);
            playerGroup.rotation.y = oldRot;
            scene.add(playerGroup);
            if(socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: 'join',
                    id: playerId,
                    username: localUsername,
                    color: currentTorsoColor,
                    skin: currentSkinColor,
                    hat: equippedHat,
                    pos: [playerGroup.position.x, playerGroup.position.y, playerGroup.position.z],
                    rot: playerGroup.rotation.y
                }));
            }
        }
        function setupProfileTab() {
            let container = document.getElementById('profile-canvas-container');
            profilePageScene = new THREE.Scene();
            profilePageScene.background = new THREE.Color('#e0e0e0');
            profilePageCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
            profilePageCamera.position.set(0, 2, 5);
            profilePageCamera.lookAt(0, 1, 0);
            profilePageRenderer = new THREE.WebGLRenderer({ antialias: true });
            container.appendChild(profilePageRenderer.domElement);
            let amb = new THREE.AmbientLight(0xffffff, 0.7);
            profilePageScene.add(amb);
            let dir = new THREE.DirectionalLight(0xffffff, 0.5);
            dir.position.set(5, 10, 5);
            profilePageScene.add(dir);
        }
        function updateProfileTabModel() {
            document.getElementById('profile-username').innerText = localUsername;
            if(profilePageGroup) profilePageScene.remove(profilePageGroup);
            let pData = createCharacterModel(currentSkinColor, currentTorsoColor, equippedHat);
            profilePageGroup = pData.group;
            profilePageGroup.position.y = -0.5;
            profilePageScene.add(profilePageGroup);
        }
        function createMicroScene(elem, hatId) {
            let s = new THREE.Scene();
            s.background = new THREE.Color('#fafafa');
            let c = new THREE.PerspectiveCamera(30, 100 / 60, 0.1, 50);
            c.position.set(0, 0.5, 3);
            c.lookAt(0, 0, 0);
            let r = new THREE.WebGLRenderer({ antialias: true });
            r.setSize(100, 60);
            elem.appendChild(r.domElement);
            let amb = new THREE.AmbientLight(0xffffff, 0.8);
            s.add(amb);
            let hatMesh = createHatMesh(hatId);
            hatMesh.position.y = -0.2;
            s.add(hatMesh);
            microScenes.push({ scene: s, camera: c, renderer: r, group: hatMesh });
        }
        function updateMicroRenderers() {}
        animate();
    </script>
</body>
</html>
